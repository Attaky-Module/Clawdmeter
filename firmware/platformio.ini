[env:attaky_core_esp32]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
; ESP32-S3-WROOM-1U-N16R8: 16MB QIO flash + 8MB OPI PSRAM
board_build.arduino.memory_type = qio_opi
; CH340X on Core is not reliable at 921600 ("chip stopped responding").
upload_speed = 460800
monitor_speed = 115200

build_flags =
    ; Core uses an external CH340X USB-UART on UART0 — there is NO native
    ; USB. ARDUINO_USB_CDC_ON_BOOT must stay OFF or all Serial output is
    ; silenced.
    -DBOARD_HAS_PSRAM
    ; ---- TFT_eSPI: ST7789 240x320 over SPI (Core internal pins) ----
    -DUSER_SETUP_LOADED=1
    -DST7789_DRIVER=1
    ; ESP32-S3 + pioarduino: default SPI port collides with flash/PSRAM SPI
    ; and TFT_eSPI crashes at first beginTransaction. Force HSPI (SPI2).
    -DUSE_HSPI_PORT=1
    ; This ST7789 panel is wired BGR — without this, R/B are swapped
    ; (Claude terracotta renders blue). Hardware-confirmed.
    -DTFT_RGB_ORDER=TFT_BGR
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=-1
    -DTFT_MOSI=13
    -DTFT_SCLK=11
    -DTFT_CS=45
    -DTFT_DC=12
    -DTFT_RST=10
    -DTFT_BL=14
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD=1
    -DSPI_FREQUENCY=40000000
    -DSPI_READ_FREQUENCY=16000000
    ; NimBLE config — peripheral, 2 simultaneous connections so the OS can
    ; hold the HID link (Space key) while the daemon holds its own
    ; connection for the custom data service.
    -DCONFIG_BT_NIMBLE_ROLE_BROADCASTER=1
    -DCONFIG_BT_NIMBLE_ROLE_PERIPHERAL=1
    -DCONFIG_BT_NIMBLE_ROLE_CENTRAL=0
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER=0
    -DCONFIG_BT_NIMBLE_MAX_CONNECTIONS=2
    ; LVGL config via build flags
    -DLV_CONF_SKIP
    -DLV_COLOR_DEPTH=16
    -DLV_USE_LOG=0
    -DLV_USE_BAR=1
    -DLV_USE_LABEL=1
    -DLV_USE_ARC=1
    -DLV_USE_BTN=1
    -DLV_USE_LINE=1
    -DLV_USE_OBJ=1
    -DLV_USE_IMG=1
    -DLV_USE_IMAGE=1
    -DLV_USE_ANIMIMG=0
    -DLV_TICK_CUSTOM=1
    -DLV_USE_SNAPSHOT=1

lib_deps =
    bodmer/TFT_eSPI@^2.5.43
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.0.0
    h2zero/NimBLE-Arduino@^2.1.1
